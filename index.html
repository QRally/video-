<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rally Master v2.7 - Stage Library</title>
    <style>
        :root {
            --bg: #0a0a0a; --card: #1a1a1a; --accent: #00e676;
            --ready: #2979ff; --error: #ff5252; --text: #ffffff;
        }
        body {
            font-family: 'Segoe UI', sans-serif; background-color: var(--bg);
            color: var(--text); margin: 0; display: flex; flex-direction: column;
            min-height: 100vh; overflow-y: auto; text-transform: uppercase;
        }
        .header { 
            background: #000; padding: 10px; border-bottom: 2px solid #333; 
            text-align: center; font-weight: 900; position: sticky; top: 0; z-index: 100;
        }
        body.ready { background-color: #001d3d; }
        body.recording { background-color: #4a0000; }

        #camera-container { width: 100%; height: 200px; background: #000; display: none; border-bottom: 2px solid var(--accent); }
        video { width: 100%; height: 100%; object-fit: cover; }

        .section-title { padding: 10px 15px; font-size: 0.7rem; color: #666; background: #111; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
        
        .coord-entry { padding: 10px; background: #151515; display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid #333; }
        input { 
            background: #000; border: 1px solid #333; color: #fff; padding: 10px; 
            border-radius: 4px; font-size: 0.8rem; width: 100%; box-sizing: border-box;
        }

        /* Stage List Styling */
        #stage-list { padding: 10px; display: flex; flex-direction: column; gap: 5px; max-height: 200px; overflow-y: auto; background: #000; }
        .stage-item { 
            background: #1a1a1a; padding: 10px; border-radius: 4px; border: 1px solid #333;
            display: flex; justify-content: space-between; align-items: center;
        }
        .stage-info { flex-grow: 1; font-size: 0.75rem; }
        .stage-actions { display: flex; gap: 5px; }
        .btn-sm { padding: 6px 10px; font-size: 0.65rem; border-radius: 3px; }

        #gps-bar { background: #000; padding: 5px 15px; display: flex; justify-content: space-between; font-size: 0.65rem; color: #888; }
        .telemetry { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
        .stat-card { background: var(--card); border-radius: 8px; padding: 12px; display: flex; flex-direction: column; align-items: center; border: 1px solid #222; }
        .active-stage-banner { background: var(--ready); color: #fff; font-size: 0.6rem; padding: 2px 10px; text-align: center; font-weight: bold; }
        
        .value { font-size: 2.2rem; font-weight: 900; font-variant-numeric: tabular-nums; }
        .label { font-size: 0.6rem; color: #888; }

        .gallery { padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .video-item { background: #1a1a1a; border-radius: 8px; padding: 10px; border-left: 4px solid var(--accent); }
        video.thumb { width: 100%; height: auto; border-radius: 4px; margin-top: 5px; }

        .controls { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { border: none; border-radius: 5px; font-weight: bold; padding: 16px; color: white; cursor: pointer; text-transform: uppercase; }
        .btn-full { grid-column: span 2; }
    </style>
</head>
<body>

<div class="header" id="status-header">SYSTEM IDLE</div>
<div class="active-stage-banner" id="current-stage-name">NO STAGE LOADED</div>

<div id="camera-container"><video id="video-preview" autoplay playsinline muted></video></div>

<div id="gps-bar">
    <span id="gps-acc">GPS: WAITING...</span>
    <span id="gps-timer">SIGNAL: --s</span>
</div>

<div class="section-title"><span>ADD NEW STAGE</span></div>
<div class="coord-entry">
    <input type="text" id="new-name" placeholder="Stage Name (e.g. Forest Run)">
    <input type="text" id="new-start" placeholder="Start Lat, Lon">
    <input type="text" id="new-finish" placeholder="Finish Lat, Lon">
    <button class="btn-full" style="background:var(--accent); color:#000;" onclick="addStage()">➕ SAVE TO LIBRARY</button>
</div>

<div class="section-title"><span>STAGE LIBRARY</span></div>
<div id="stage-list"></div>

<div class="telemetry">
    <div class="stat-card"><span class="label">KM/H</span><span class="value" id="speed">0</span></div>
    <div class="stat-card"><span class="label" id="dist-type">DIST (M)</span><span class="value" id="dist-label">--</span></div>
</div>

<div class="section-title">VIDEO GALLERY</div>
<div id="video-gallery" class="gallery"></div>

<div class="controls">
    <button id="cam-toggle-btn" class="btn-full" style="background:#333;" onclick="toggleCamera()">📷 TOGGLE CAMERA</button>
    <button id="audio-btn" style="background:#444;" onclick="initAudio()">🔈 AUDIO</button>
    <button style="background: #673ab7;" onclick="playBeep(880, 0.4)">🎵 TEST</button>
</div>

<script>
    let stages = JSON.parse(localStorage.getItem('rally_stages')) || [];
    let activeConfig = null;
    let state = 'IDLE', lastGpsTime = Date.now(), soundEnabled = false, audioCtx = null;
    let videoStream = null, mediaRecorder = null, recordedChunks = [];

    renderStages();

    // --- STAGE LIBRARY LOGIC ---
    function addStage() {
        const name = document.getElementById('new-name').value;
        const startStr = document.getElementById('new-start').value;
        const finishStr = document.getElementById('new-finish').value;

        if(!name || !startStr || !finishStr) return alert("Fill all fields");

        const startArr = startStr.split(',').map(p => parseFloat(p.trim()));
        const finishArr = finishStr.split(',').map(p => parseFloat(p.trim()));

        const newStage = {
            id: Date.now(),
            name: name,
            start: { lat: startArr[0], lon: startArr[1] },
            finish: { lat: finishArr[0], lon: finishArr[1] }
        };

        stages.push(newStage);
        localStorage.setItem('rally_stages', JSON.stringify(stages));
        renderStages();
        
        // Clear inputs
        document.getElementById('new-name').value = '';
        document.getElementById('new-start').value = '';
        document.getElementById('new-finish').value = '';
    }

    function deleteStage(id) {
        stages = stages.filter(s => s.id !== id);
        localStorage.setItem('rally_stages', JSON.stringify(stages));
        renderStages();
    }

    function loadStage(id) {
        activeConfig = stages.find(s => s.id === id);
        document.getElementById('current-stage-name').innerText = "ACTIVE: " + activeConfig.name;
        document.getElementById('current-stage-name').style.background = "var(--ready)";
        if(soundEnabled) playBeep(1000, 0.1);
    }

    function renderStages() {
        const container = document.getElementById('stage-list');
        container.innerHTML = stages.length === 0 ? '<div style="color:#444; font-size:0.7rem;">Empty</div>' : '';
        stages.forEach(s => {
            const div = document.createElement('div');
            div.className = 'stage-item';
            div.innerHTML = `
                <div class="stage-info"><strong>${s.name}</strong></div>
                <div class="stage-actions">
                    <button class="btn-sm" style="background:var(--ready)" onclick="loadStage(${s.id})">LOAD</button>
                    <button class="btn-sm" style="background:var(--error)" onclick="deleteStage(${s.id})">DEL</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    // --- LOGIC & GPS (Directional) ---
    function runLogic(dS, dF, kmh) {
        if(!activeConfig) return;
        const h = document.getElementById('status-header');
        
        document.getElementById('dist-label').innerText = state === 'ACTIVE' ? Math.round(dF) : Math.round(dS);
        document.getElementById('dist-type').innerText = state === 'ACTIVE' ? "TO FINISH (M)" : "TO START (M)";

        if (state === 'IDLE' && dS < 60) {
            state = 'READY'; document.body.className = 'ready'; h.innerText = "READY AT START";
            if(!videoStream) startCamera();
            playBeep(440, 0.2);
        }
        
        if (state === 'READY' && dS < 60 && kmh > 15) {
            state = 'ACTIVE'; document.body.className = 'recording';
            h.innerText = "STAGE ACTIVE"; startRecording(); playBeep(880, 0.6);
        }

        if (state === 'ACTIVE' && dF < 60) {
            state = 'COOLDOWN'; h.innerText = "FINISH REACHED";
            setTimeout(() => {
                if(mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
                state = 'IDLE'; document.body.className = ''; h.innerText = "SYSTEM IDLE";
                playBeep(600, 1.0);
            }, 5000);
        }

        if (state === 'READY' && dS > 80) {
            state = 'IDLE'; document.body.className = ''; h.innerText = "SYSTEM IDLE";
        }
    }

    // ... (Previous Camera, Video, and Audio functions remain the same) ...

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            lastGpsTime = Date.now();
            const { latitude, longitude, speed } = pos.coords;
            const kmh = Math.round((speed || 0) * 3.6);
            document.getElementById('speed').innerText = kmh;
            if (activeConfig) {
                const dS = calcDist(latitude, longitude, activeConfig.start.lat, activeConfig.start.lon);
                const dF = calcDist(latitude, longitude, activeConfig.finish.lat, activeConfig.finish.lon);
                runLogic(dS, dF, kmh);
            }
        }, null, { enableHighAccuracy: true });
    }

    function calcDist(lat1, lon1, lat2, lon2) {
        const R = 6371e3, p1 = lat1 * Math.PI/180, p2 = lat2 * Math.PI/180;
        const dp = (lat2-lat1) * Math.PI/180, dl = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dp/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    async function toggleCamera() { if (videoStream) { stopCamera(); } else { await startCamera(); } }
    async function startCamera() {
        try {
            videoStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
            document.getElementById('video-preview').srcObject = videoStream;
            document.getElementById('camera-container').style.display = 'block';
        } catch (e) { alert("Camera Denied"); }
    }
    function stopCamera() {
        if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; document.getElementById('camera-container').style.display = 'none'; }
    }

    function startRecording() {
        if (!videoStream) return;
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(videoStream);
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = saveVideo;
        mediaRecorder.start();
    }

    function saveVideo() {
        const blob = new Blob(recordedChunks, { type: "video/webm" });
        const url = URL.createObjectURL(blob);
        const item = document.createElement('div');
        item.className = 'video-item';
        item.innerHTML = `<strong>${activeConfig ? activeConfig.name : 'Run'}</strong><br><video src="${url}" controls class="thumb"></video>`;
        document.getElementById('video-gallery').prepend(item);
    }

    async function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        soundEnabled = !soundEnabled;
        document.getElementById('audio-btn').className = soundEnabled ? "btn-audio-on" : "btn-audio-off";
        if(soundEnabled) playBeep(880, 0.2); 
    }

    function playBeep(f, d) {
        if (!soundEnabled || !audioCtx) return;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(f, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
        osc.start(); osc.stop(audioCtx.currentTime + d);
    }

    setInterval(() => { document.getElementById('gps-timer').innerText = `SIGNAL: ${((Date.now() - lastGpsTime)/1000).toFixed(1)}s`; }, 500);
</script>
</body>
</html>
