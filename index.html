<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rally Master v2.5 - Pro</title>
    <style>
        :root {
            --bg: #0a0a0a; --card: #1a1a1a; --accent: #00e676;
            --ready: #2979ff; --error: #ff5252; --text: #ffffff;
        }
        body {
            font-family: 'Segoe UI', sans-serif; background-color: var(--bg);
            color: var(--text); margin: 0; display: flex; flex-direction: column;
            min-height: 100vh; overflow-y: auto; text-transform: uppercase;
        }
        .header { 
            background: #000; padding: 10px; border-bottom: 2px solid #333; 
            text-align: center; font-weight: 900; position: sticky; top: 0; z-index: 100;
        }
        body.ready { background-color: #001d3d; }
        body.recording { background-color: #4a0000; }

        #camera-container { width: 100%; height: 200px; background: #000; display: none; border-bottom: 2px solid var(--accent); }
        video { width: 100%; height: 100%; object-fit: cover; }

        .section-title { padding: 10px 15px; font-size: 0.7rem; color: #666; background: #111; border-bottom: 1px solid #222; }
        
        .coord-entry { padding: 10px; background: #151515; display: flex; flex-direction: column; gap: 8px; }
        .coord-input-group { display: flex; flex-direction: column; gap: 4px; }
        .coord-input-group label { font-size: 0.6rem; color: var(--accent); margin-left: 2px; }
        .coord-entry input { 
            background: #000; border: 1px solid #333; color: #fff; padding: 12px; 
            border-radius: 4px; font-size: 0.85rem; width: 100%; box-sizing: border-box;
        }

        #gps-bar { background: #000; padding: 5px 15px; display: flex; justify-content: space-between; font-size: 0.65rem; color: #888; }
        .telemetry { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
        .stat-card { background: var(--card); border-radius: 8px; padding: 12px; display: flex; flex-direction: column; align-items: center; }
        .value { font-size: 2.2rem; font-weight: 900; font-variant-numeric: tabular-nums; }
        .label { font-size: 0.6rem; color: #888; }

        .gallery { padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .video-item { background: #1a1a1a; border-radius: 8px; padding: 10px; border-left: 4px solid var(--accent); }
        video.thumb { width: 100%; height: auto; border-radius: 4px; margin-top: 5px; }

        .controls { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { border: none; border-radius: 5px; font-weight: bold; padding: 16px; color: white; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-full { grid-column: span 2; }
        .btn-acc { background: var(--accent); }
        .btn-audio-off { background: #444; }
        .btn-audio-on { background: #ff9800; border: 2px solid #fff; }
    </style>
</head>
<body>

<div class="header" id="status-header">SYSTEM IDLE</div>

<div id="camera-container"><video id="video-preview" autoplay playsinline muted></video></div>

<div id="gps-bar">
    <span id="gps-acc">GPS: WAITING...</span>
    <span id="gps-timer">SIGNAL: --s</span>
</div>

<div class="section-title">Manual Geo-Entry (Paste from Maps)</div>
<div class="coord-entry">
    <div class="coord-input-group">
        <label>START LINE (LAT, LON)</label>
        <input type="text" id="geo-start" placeholder="Paste Lat, Lon" oninput="parseGeo('start')">
    </div>
    <div class="coord-input-group">
        <label>FINISH LINE (LAT, LON)</label>
        <input type="text" id="geo-finish" placeholder="Paste Lat, Lon" oninput="parseGeo('finish')">
    </div>
    <button id="save-btn" class="btn-full" style="background:#222; font-size:0.7rem; margin-top:5px;" onclick="saveConfig()">💾 OVERWRITE & SAVE CONFIG</button>
</div>

<div class="telemetry">
    <div class="stat-card"><span class="label">KM/H</span><span class="value" id="speed">0</span></div>
    <div class="stat-card"><span class="label">DIST TO START (M)</span><span class="value" id="dist-label">--</span></div>
</div>

<div class="section-title">Video Gallery</div>
<div id="video-gallery" class="gallery">
    <div style="color:#444; text-align:center; font-size:0.8rem;">No clips saved yet</div>
</div>

<div class="controls">
    <button id="cam-toggle-btn" class="btn-full btn-acc" onclick="toggleCamera()">1. ENABLE PHONE CAMERA</button>
    <button id="audio-btn" class="btn-audio-off" onclick="initAudio()">🔈 AUDIO: OFF</button>
    <button style="background: #673ab7;" onclick="playBeep(880, 0.4)">🎵 TEST BEEP</button>
</div>

<script>
    let config = { 
        start: JSON.parse(localStorage.getItem('r_start')), 
        finish: JSON.parse(localStorage.getItem('r_finish')), 
        radius: 60, minSpeed: 15 
    };
    
    let state = 'IDLE', lastGpsTime = Date.now(), soundEnabled = false, audioCtx = null;
    let videoStream = null, mediaRecorder = null, recordedChunks = [];

    // Load existing config into inputs on start
    if(config.start) document.getElementById('geo-start').value = `${config.start.lat}, ${config.start.lon}`;
    if(config.finish) document.getElementById('geo-finish').value = `${config.finish.lat}, ${config.finish.lon}`;

    function parseGeo(type) {
        const val = document.getElementById(`geo-${type}`).value;
        const parts = val.split(',').map(p => p.trim());
        if(parts.length === 2) {
            const lat = parseFloat(parts[0]);
            const lon = parseFloat(parts[1]);
            if(!isNaN(lat) && !isNaN(lon)) {
                config[type] = { lat, lon };
            }
        }
    }

    function saveConfig() {
        if(config.start && config.finish) {
            localStorage.setItem('r_start', JSON.stringify(config.start));
            localStorage.setItem('r_finish', JSON.stringify(config.finish));
            
            const btn = document.getElementById('save-btn');
            btn.innerText = "✅ COORDINATES UPDATED";
            btn.style.background = "#00e676";
            setTimeout(() => { 
                btn.innerText = "💾 OVERWRITE & SAVE CONFIG"; 
                btn.style.background = "#222";
            }, 2000);
            if(soundEnabled) playBeep(1200, 0.1);
        } else {
            alert("Ensure both points have valid Lat, Lon pasted!");
        }
    }

    // --- CAMERA ENGINE ---
    async function toggleCamera() {
        if (videoStream) { stopCamera(); } else { await startCamera(); }
    }

    async function startCamera() {
        try {
            videoStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment", width: 1280, height: 720 }, 
                audio: false 
            });
            document.getElementById('video-preview').srcObject = videoStream;
            document.getElementById('camera-container').style.display = 'block';
            document.getElementById('cam-toggle-btn').innerText = "DISABLE PHONE CAMERA";
        } catch (e) { alert("Camera Access Denied or Unavailable"); }
    }

    function stopCamera() {
        if (videoStream) {
            videoStream.getTracks().forEach(t => t.stop());
            videoStream = null;
            document.getElementById('camera-container').style.display = 'none';
            document.getElementById('cam-toggle-btn').innerText = "1. ENABLE PHONE CAMERA";
        }
    }

    // --- LOGIC ENGINE ---
    function runLogic(dS, dF, kmh) {
        const h = document.getElementById('status-header');
        document.getElementById('dist-label').innerText = Math.round(dS);

        if (state === 'IDLE' && dS < config.radius) {
            state = 'READY'; document.body.className = 'ready'; h.innerText = "READY TO START";
            if(!videoStream) startCamera();
            playBeep(440, 0.2);
        }
        
        if (state === 'READY' && kmh > config.minSpeed) {
            state = 'ACTIVE'; document.body.className = 'recording';
            h.innerText = "STAGE ACTIVE"; 
            startRecording(); 
            playBeep(880, 0.6);
        }

        if (state === 'ACTIVE' && dF < config.radius) {
            state = 'COOLDOWN';
            h.innerText = "FINISH REACHED";
            setTimeout(() => {
                if(mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
                state = 'IDLE'; document.body.className = ''; h.innerText = "SYSTEM IDLE";
                playBeep(600, 1.0);
            }, 5000);
        }
    }

    // --- GPS & MATH ---
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            lastGpsTime = Date.now();
            const { latitude, longitude, speed } = pos.coords;
            const kmh = Math.round((speed || 0) * 3.6);
            document.getElementById('speed').innerText = kmh;
            document.getElementById('gps-acc').innerText = `GPS: ACTIVE`;
            
            if (config.start && config.finish) {
                const dS = calcDist(latitude, longitude, config.start.lat, config.start.lon);
                const dF = calcDist(latitude, longitude, config.finish.lat, config.finish.lon);
                runLogic(dS, dF, kmh);
            }
        }, null, { enableHighAccuracy: true });
    }

    function calcDist(lat1, lon1, lat2, lon2) {
        const R = 6371e3, p1 = lat1 * Math.PI/180, p2 = lat2 * Math.PI/180;
        const dp = (lat2-lat1) * Math.PI/180, dl = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dp/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    // --- VIDEO HANDLING ---
    function startRecording() {
        if (!videoStream) return;
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(videoStream, { mimeType: 'video/webm' });
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.onstop = saveVideo;
        mediaRecorder.start();
    }

    function saveVideo() {
        const blob = new Blob(recordedChunks, { type: "video/webm" });
        const url = URL.createObjectURL(blob);
        const gallery = document.getElementById('video-gallery');
        if(gallery.innerHTML.includes("No clips")) gallery.innerHTML = '';
        const item = document.createElement('div');
        item.className = 'video-item';
        item.innerHTML = `<strong>RUN: ${new Date().toLocaleTimeString()}</strong><br>
                          <video src="${url}" controls class="thumb"></video>
                          <a href="${url}" download="rally_run.webm" style="color:var(--ready); font-size:0.7rem; display:block; margin-top:5px;">⬇️ DOWNLOAD VIDEO</a>`;
        gallery.prepend(item);
    }

    // --- AUDIO FIX ---
    async function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        soundEnabled = !soundEnabled;
        const btn = document.getElementById('audio-btn');
        btn.innerText = soundEnabled ? "🔊 AUDIO: ON" : "🔈 AUDIO: OFF";
        btn.className = soundEnabled ? "btn-audio-on" : "btn-audio-off";
        if(soundEnabled) playBeep(880, 0.2); 
    }

    function playBeep(f, d) {
        if (!soundEnabled || !audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(f, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + d);
        osc.start(); osc.stop(audioCtx.currentTime + d);
    }

    setInterval(() => { 
        document.getElementById('gps-timer').innerText = `SIGNAL: ${((Date.now() - lastGpsTime)/1000).toFixed(1)}s`; 
    }, 500);
</script>
</body>
</html>
